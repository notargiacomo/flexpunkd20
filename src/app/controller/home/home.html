<mat-card>
  <div class="row">
    <div class="col-sm-12">
      <h2><b>ATRIBUTOS FLEXPUNK D20</b></h2>
      <hr />
    </div>
  </div>
  <div class="row">
    <div class="col-12 label">
      <b style="font-size: large">{{ 'PONTOS GASTOS: ' + points }}</b>
    </div>
  </div>
  <br />
  <div class="row">
    <div class="col-3">
      <app-attribute
        [points]="points"
        [attribute]="for"
        (changePoints)="calculaPontos($event)"
      ></app-attribute>
    </div>
  </div>
  <br />
  <div class="row">
    <div class="col-3">
      <app-attribute
        [points]="points"
        [attribute]="des"
        (changePoints)="calculaPontos($event)"
      ></app-attribute>
    </div>
  </div>
  <br />
  <div class="row">
    <div class="col-3">
      <app-attribute
        [points]="points"
        [attribute]="con"
        (changePoints)="calculaPontos($event)"
      ></app-attribute>
    </div>
  </div>
  <br />
  <div class="row">
    <div class="col-3">
      <app-attribute
        [points]="points"
        [attribute]="int"
        (changePoints)="calculaPontos($event)"
      ></app-attribute>
    </div>
  </div>
  <br />
  <div class="row">
    <div class="col-3">
      <app-attribute
        [points]="points"
        [attribute]="sab"
        (changePoints)="calculaPontos($event)"
      ></app-attribute>
    </div>
  </div>
  <br />
  <div class="row">
    <div class="col-3">
      <app-attribute
        [points]="points"
        [attribute]="car"
        (changePoints)="calculaPontos($event)"
      ></app-attribute>
    </div>
  </div>
  <br />
  <div class="row">
    <div class="col-3">
      <app-attribute
        [points]="points"
        [attribute]="sor"
        (changePoints)="calculaPontos($event)"
      ></app-attribute>
    </div>
  </div>
</mat-card>
